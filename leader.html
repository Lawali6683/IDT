<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --danger: #ef4444;
            --success: #10b981;
            --sidebar: #0f172a;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text-main); line-height: 1.6; }
        .hidden { display: none !important; }

        .auth-wrapper { 
            height: 100vh; display: flex; align-items: center; justify-content: center; 
            background: radial-gradient(circle at top right, #4f46e5, #0f172a); 
            padding: 20px;
        }

        .auth-card { 
            background: white; padding: 40px; border-radius: 24px; width: 100%; 
            max-width: 420px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
        }

        .auth-logo { width: 80px; height: 80px; border-radius: 20px; margin-bottom: 20px; object-fit: cover; border: 3px solid var(--primary); }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--text-sub); }
        .input-field { 
            width: 100%; padding: 14px 16px; border-radius: 12px; border: 1.5px solid var(--border); 
            outline: none; transition: 0.3s; font-size: 15px; background: #f8fafc;
        }
        .input-field:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1); }

        .dashboard-layout { display: flex; min-height: 100vh; }

        .sidebar { 
            width: 280px; background: var(--sidebar); color: white; padding: 30px; 
            position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 1000;
            transition: 0.3s;
        }

        .stats-card { 
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05)); 
            padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px;
        }

        .main-content { flex: 1; margin-left: 280px; padding: 40px; width: 100%; }

        .top-nav { 
            display: flex; justify-content: space-between; align-items: center; 
            background: white; padding: 20px 30px; border-radius: 20px; 
            margin-bottom: 35px; border: 1px solid var(--border);
        }

        .users-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; 
        }

        .user-card { 
            background: white; border-radius: 24px; border: 1px solid var(--border); 
            overflow: hidden; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .user-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }

        .card-header { 
            padding: 25px; background: #f8fafc; display: flex; align-items: center; 
            gap: 15px; border-bottom: 1px solid var(--border);
        }
        .user-img { width: 65px; height: 65px; border-radius: 18px; object-fit: cover; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .data-grid { padding: 25px; display: grid; gap: 12px; }
        .data-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .data-row b { color: var(--text-sub); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

        .answers-area { padding: 0 25px 25px; }
        details { background: #f1f5f9; border-radius: 15px; overflow: hidden; }
        summary { padding: 12px 15px; cursor: pointer; font-weight: 700; font-size: 13px; color: var(--primary); outline: none; }
        .answer-box { padding: 15px; border-top: 1px solid var(--border); font-size: 13px; max-height: 300px; overflow-y: auto; }
        .answer-box p { margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #e2e8f0; }

        .btn { 
            padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; 
            font-weight: 700; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; font-size: 14px;
        }
        .btn-delete { background: #fff1f2; color: var(--danger); width: 100%; justify-content: center; }
        .btn-delete:hover { background: var(--danger); color: white; }

        #toast-box { position: fixed; top: 20px; right: 20px; z-index: 10001; }
        .toast { padding: 16px 24px; border-radius: 12px; color: white; font-weight: 600; margin-bottom: 10px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); animation: slideIn 0.3s ease; }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 1024px) {
            .sidebar { width: 0; padding: 0; overflow: hidden; }
            .main-content { margin-left: 0; padding: 20px; }
            .users-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="toast-box"></div>

    <div id="login-view" class="auth-wrapper">
        <div class="auth-card">
            <img src="https://i.imgur.com/54kosOd.png" class="auth-logo">
            <h2 style="margin-bottom: 10px;">Admin Access</h2>
            <p style="color: var(--text-sub); margin-bottom: 30px;">Manage your system applicants</p>
            
            <form id="login-form">
                <div class="input-group">
                    <label>Admin Email</label>
                    <input type="email" id="email" class="input-field" placeholder="admin@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="pass" class="input-field" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn" style="background: var(--primary); color: white; width: 100%; justify-content: center; padding: 16px;">
                    Secure Sign In
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard-view" class="dashboard-layout hidden">
        <aside class="sidebar">
            <div style="text-align: center; margin-bottom: 40px;">
                <img src="https://i.imgur.com/54kosOd.png" style="width: 60px; border-radius: 12px;">
                <h3 style="margin-top: 10px;">Control Panel</h3>
            </div>

            <div class="stats-card">
                <p style="font-size: 12px; opacity: 0.7; font-weight: 700; text-transform: uppercase;">Total Applicants</p>
                <h1 id="count-display" style="font-size: 42px;">0</h1>
            </div>

            <button class="btn" id="copy-emails" style="background: rgba(255,255,255,0.1); color: white; margin-bottom: 10px;">
                <i class="fas fa-copy"></i> Copy All Emails
            </button>

            <button class="btn" onclick="logout()" style="margin-top: auto; background: #312e81; color: white;">
                <i class="fas fa-power-off"></i> Logout
            </button>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div>
                    <h2 style="font-weight: 800;">Applicant Database</h2>
                    <p style="font-size: 13px; color: var(--text-sub);">Real-time user data management</p>
                </div>
                <i class="fas fa-users-cog" style="font-size: 24px; color: var(--primary);"></i>
            </header>

            <div id="loader" style="text-align: center; padding: 50px;">
                <i class="fas fa-circle-notch fa-spin" style="font-size: 40px; color: var(--primary);"></i>
            </div>

            <div id="users-grid" class="users-grid"></div>
        </main>
    </div>

    <script type="module">
        import { app } from './firebase.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const auth = getAuth(app);
        const db = getDatabase(app);
        let allEmails = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('login-view').classList.remove('hidden');
                document.getElementById('dashboard-view').classList.add('hidden');
            }
        });

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
                showToast("Access Granted", "success");
            } catch (err) {
                showToast("Invalid Credentials", "error");
                btn.disabled = false;
            }
        };

        async function loadData() {
            const grid = document.getElementById('users-grid');
            try {
                const snap = await get(ref(db, 'users'));
                document.getElementById('loader').classList.add('hidden');
                grid.innerHTML = '';
                allEmails = [];

                if (snap.exists()) {
                    const users = snap.val();
                    const keys = Object.keys(users);
                    document.getElementById('count-display').innerText = keys.length;

                    keys.forEach(id => {
                        const u = users[id];
                        allEmails.push(u.personalInfo.email);
                        grid.innerHTML += `
                            <div class="user-card" id="card-${id}">
                                <div class="card-header">
                                    <img src="${u.personalInfo.photoUrl}" class="user-img" onerror="this.src='https://ui-avatars.com/api/?name=User'">
                                    <div>
                                        <h4 style="font-weight: 800;">${u.personalInfo.fullName}</h4>
                                        <span style="font-size: 11px; background: #e0e7ff; color: #4338ca; padding: 3px 8px; border-radius: 5px; font-weight: 700;">${u.teamId}</span>
                                    </div>
                                </div>
                                <div class="data-grid">
                                    <div class="data-row"><b>Email:</b> <span>${u.personalInfo.email}</span></div>
                                    <div class="data-row"><b>Phone:</b> <span>${u.personalInfo.phone}</span></div>
                                    <div class="data-row"><b>Password:</b> <span>${u.personalInfo.password}</span></div>
                                    <div class="data-row"><b>Address:</b> <span>${u.address.lga}, ${u.address.state}</span></div>
                                </div>
                                <div class="answers-area">
                                    <details>
                                        <summary>Full Application Form</summary>
                                        <div class="answer-box">
                                            <p><strong>Expertise:</strong> ${u.professional.expertise}</p>
                                            <p><strong>Education:</strong> ${u.professional.education}</p>
                                            <p><strong>Motivation:</strong> ${u.professional.whyJoin}</p>
                                            <p><strong>Work Link:</strong> <a href="${u.professional.workLink}" target="_blank">View Work</a></p>
                                            <p><strong>WhatsApp:</strong> ${u.personalInfo.whatsapp}</p>
                                            <p><strong>Device:</strong> ${u.agreements.deviceType}</p>
                                            <p><strong>Address:</strong> ${u.address.homeAddress}</p>
                                            <p><strong>Facebook:</strong> ${u.socialMedia.facebook}</p>
                                        </div>
                                    </details>
                                    <button class="btn btn-delete" style="margin-top: 15px;" onclick="deleteUser('${id}')">
                                        <i class="fas fa-trash-alt"></i> Delete Record
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    grid.innerHTML = '<p>No records found.</p>';
                }
            } catch (err) {
                showToast("Database Error", "error");
            }
        }

        window.deleteUser = async (id) => {
            if (confirm("Goge wannan user din gaba daya daga database?")) {
                try {
                    await remove(ref(db, 'users/' + id));
                    document.getElementById(`card-${id}`).style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById(`card-${id}`).remove();
                        const count = document.getElementById('count-display');
                        count.innerText = parseInt(count.innerText) - 1;
                    }, 300);
                    showToast("User Deleted", "success");
                } catch (err) {
                    showToast("Failed to delete", "error");
                }
            }
        };

        document.getElementById('copy-emails').onclick = () => {
            navigator.clipboard.writeText(allEmails.join(', '));
            showToast("Emails Copied", "success");
        };

        window.logout = () => signOut(auth);

        function showToast(msg, type) {
            const box = document.getElementById('toast-box');
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.background = type === 'success' ? 'var(--success)' : 'var(--danger)';
            t.innerText = msg;
            box.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>
