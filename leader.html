<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Team Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --danger: #ef4444;
            --success: #10b981;
            --sidebar-bg: #0f172a;
            --bg-body: #f1f5f9;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); line-height: 1.5; }
        .hidden { display: none !important; }

        .auth-wrapper { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--sidebar-bg); padding: 20px; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .auth-logo { width: 80px; margin-bottom: 20px; border-radius: 50%; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .input-group input { width: 100%; padding: 12px 15px 12px 45px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--sidebar-bg); color: white; padding: 30px 20px; position: fixed; height: 100vh; z-index: 100; transition: 0.3s; }
        .main-content { flex: 1; margin-left: 280px; padding: 30px; }

        .stats-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }
        .btn { border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
        .btn-primary { background: var(--primary); color: white; padding: 12px; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 10px; margin-top: auto; }
        .btn-outline-danger:hover { background: var(--danger); color: white; }

        .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; margin-top: 30px; }
        .user-card { background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .card-header { padding: 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        
        .card-body { padding: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .info-row label { color: var(--text-muted); font-weight: 600; }
        .info-row span { color: var(--text-main); font-weight: 500; cursor: pointer; }
        
        details { margin-top: 15px; background: #f8fafc; border-radius: 10px; padding: 10px; }
        summary { font-weight: 700; font-size: 13px; color: var(--primary); cursor: pointer; outline: none; }
        .agreement-list { margin-top: 10px; font-size: 13px; }
        .agreement-item { padding: 5px 0; border-bottom: 1px dashed #e2e8f0; }
        .agreement-item b { display: block; color: var(--text-muted); font-size: 11px; }

        .btn-delete { background: #fee2e2; color: var(--danger); padding: 8px; font-size: 13px; margin-top: 15px; }
        .btn-delete:hover { background: var(--danger); color: white; }

        #toast-box { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .toast { padding: 15px 25px; border-radius: 12px; color: white; font-weight: 600; margin-top: 10px; animation: slideIn 0.3s ease; }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 992px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar h3, .sidebar span, .sidebar .btn span { display: none; }
            .main-content { margin-left: 80px; }
            .sidebar-header img { width: 40px; }
        }

        @media (max-width: 600px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 15px; }
        }
    </style>
</head>
<body>

    <div id="toast-box"></div>

    <div id="login-section" class="auth-wrapper">
        <div class="auth-card">
            <img src="https://i.imgur.com/54kosOd.png" class="auth-logo">
            <h2 style="margin-bottom: 10px;">Admin Access</h2>
            <form id="login-form">
                <div class="input-group">
                    <i class="fas fa-user-shield"></i>
                    <input type="email" id="email" placeholder="Admin Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login to Dashboard</button>
            </form>
        </div>
    </div>

    <div id="dashboard-section" class="dashboard-container hidden">
        <aside class="sidebar">
            <div class="sidebar-header" style="text-align: center;">
                <img src="https://i.imgur.com/54kosOd.png" style="width: 60px; border-radius: 50%;">
                <h3>Admin Hub</h3>
            </div>
            <div class="stats-card">
                <span>Active Users</span>
                <h2 id="user-count">0</h2>
            </div>
            <button id="copy-emails" class="btn btn-primary">
                <i class="fas fa-copy"></i> <span>Copy All Emails</span>
            </button>
            <button onclick="logout()" class="btn btn-outline-danger">
                <i class="fas fa-power-off"></i> <span>Logout</span>
            </button>
        </aside>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h1>Applications Manager</h1>
            </header>
            <div id="loader" style="text-align: center; padding: 50px;">
                <i class="fas fa-circle-notch fa-spin fa-2x" style="color: var(--primary);"></i>
            </div>
            <div id="users-grid" class="users-grid"></div>
        </main>
    </div>

    <script type="module">
        import { app } from './firebase.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, get, remove, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const auth = getAuth(app);
        const db = getDatabase(app);
        let allEmails = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('dashboard-section').classList.add('hidden');
            }
        });

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                showToast("Welcome Back Admin!", "success");
            } catch (err) {
                showToast("Error: " + err.message, "danger");
            }
        };

        function loadData() {
            const userRef = ref(db, 'users');
            onValue(userRef, (snapshot) => {
                const grid = document.getElementById('users-grid');
                const loader = document.getElementById('loader');
                loader.style.display = 'none';
                grid.innerHTML = '';
                allEmails = [];

                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const keys = Object.keys(data);
                    document.getElementById('user-count').innerText = keys.length;

                    keys.forEach(id => {
                        const user = data[id];
                        allEmails.push(user.personalInfo.email);
                        renderUserCard(id, user);
                    });
                } else {
                    grid.innerHTML = '<p>No applications found.</p>';
                    document.getElementById('user-count').innerText = "0";
                }
            });
        }

        function renderUserCard(id, user) {
            const grid = document.getElementById('users-grid');
            const div = document.createElement('div');
            div.className = 'user-card';
            div.innerHTML = `
                <div class="card-header">
                    <img src="${user.personalInfo.photoUrl}" class="user-avatar" onerror="this.src='https://ui-avatars.com/api/?name=${user.personalInfo.fullName}'">
                    <div>
                        <h4 style="font-size: 16px;">${user.personalInfo.fullName}</h4>
                        <small style="color: var(--primary); font-weight: 800;">ID: ${user.teamId}</small>
                    </div>
                </div>
                <div class="card-body">
                    <div class="info-row"><label>Email</label><span onclick="copyThis('${user.personalInfo.email}')">${user.personalInfo.email}</span></div>
                    <div class="info-row"><label>Phone</label><span onclick="copyThis('${user.personalInfo.phone}')">${user.personalInfo.phone}</span></div>
                    <div class="info-row"><label>Password</label><span>${user.personalInfo.password}</span></div>
                    <div class="info-row"><label>Expertise</label><span>${user.professional.expertise}</span></div>
                    
                    <details>
                        <summary>Full Details & Agreements</summary>
                        <div class="agreement-list">
                            <div class="agreement-item"><b>AI Truth Agreement:</b> ${user.agreements.aiTruth}</div>
                            <div class="agreement-item"><b>AI Usage Skill:</b> ${user.agreements.aiUsage}</div>
                            <div class="agreement-item"><b>Sharing Ideas:</b> ${user.agreements.sharingIdeas}</div>
                            <div class="agreement-item"><b>Hard Work:</b> ${user.agreements.hardWork}</div>
                            <div class="agreement-item"><b>Profit Share:</b> ${user.agreements.profitSharing}</div>
                            <div class="agreement-item"><b>Device:</b> ${user.agreements.deviceType}</div>
                            <div class="agreement-item"><b>Video Editing:</b> ${user.agreements.videoEditing}</div>
                            <div class="agreement-item"><b>Education:</b> ${user.professional.education}</div>
                            <div class="agreement-item"><b>State/LGA:</b> ${user.address.state} / ${user.address.lga}</div>
                        </div>
                    </details>

                    <button class="btn btn-delete" onclick="deleteUser('${id}')">
                        <i class="fas fa-trash-alt"></i> Delete User Forever
                    </button>
                </div>
            `;
            grid.appendChild(div);
        }

        window.copyThis = (text) => {
            navigator.clipboard.writeText(text);
            showToast("Copied!", "success");
        }

        document.getElementById('copy-emails').onclick = () => {
            if (allEmails.length > 0) {
                navigator.clipboard.writeText(allEmails.join(', '));
                showToast("All emails copied to clipboard!", "success");
            } else {
                showToast("No emails to copy", "danger");
            }
        };

        window.deleteUser = async (id) => {
            if (confirm("Gargaɗi: Wannan zai goge duka bayanan user ɗin nan daga database gaba ɗaya. Shin ka tabbata?")) {
                try {
                    await remove(ref(db, 'users/' + id));
                    showToast("User deleted successfully", "success");
                } catch (err) {
                    showToast("Error deleting user", "danger");
                }
            }
        };

        window.logout = () => signOut(auth);

        function showToast(msg, type) {
            const box = document.getElementById('toast-box');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'success' ? 'var(--success)' : 'var(--danger)';
            toast.innerText = msg;
            box.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }
    </script>
</body>
</html>
