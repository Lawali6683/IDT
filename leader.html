<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Creative Developing Company</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #ef4444;
            --bg-light: #f3f4f6;
            --card-bg: #ffffff;
            --text-dark: #111827;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --sidebar-width: 280px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { background: var(--bg-light); color: var(--text-dark); overflow-x: hidden; }
        .hidden { display: none !important; }

        .auth-wrapper { height: 100vh; display: flex; align-items: center; justify-content: center; background: #1e293b; padding: 20px; }
        .auth-card { background: var(--card-bg); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .auth-logo { width: 90px; margin-bottom: 15px; border-radius: 50%; }
        .input-box { display: flex; align-items: center; background: #f9fafb; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; padding: 0 15px; }
        .input-box i { color: var(--text-light); }
        .input-box input { width: 100%; padding: 12px; border: none; background: transparent; outline: none; font-size: 15px; }
        .btn-primary { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-primary:hover { background: var(--primary-hover); }

        .dashboard-wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-width); background: #0f172a; color: white; padding: 30px 20px; position: fixed; height: 100vh; display: flex; flex-direction: column; z-index: 1000; transition: 0.3s; }
        .sidebar-header { text-align: center; margin-bottom: 35px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .sidebar-header img { width: 70px; border-radius: 50%; margin-bottom: 10px; }
        .stats-box { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        .stats-box h1 { font-size: 32px; font-weight: 800; }
        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; margin-bottom: 15px; background: var(--primary); color: white; }
        .btn-logout { margin-top: auto; background: transparent; color: #ef4444; border: 1px solid #ef4444; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .main-content { flex: 1; margin-left: var(--sidebar-width); padding: 40px; transition: 0.3s; }
        .top-header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 30px; }
        
        .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; }
        .user-card { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card-top { padding: 20px; background: #fafafa; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; border-radius: 16px 16px 0 0; }
        .card-img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }
        .card-info { padding: 20px; }
        .data-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
        .data-item label { font-weight: 700; color: var(--text-light); }
        
        .accordian-box { margin-top: 15px; background: #f8fafc; border-radius: 8px; padding: 10px; }
        .accordian-box summary { font-weight: 800; font-size: 14px; color: var(--primary); cursor: pointer; padding: 5px; }
        .q-row { margin: 10px 0; padding-bottom: 5px; border-bottom: 1px dashed #ddd; }
        .q-row b { display: block; font-size: 12px; color: #64748b; }
        .q-row p { font-size: 13px; font-weight: 600; color: #1e293b; }

        .btn-delete { background: var(--danger); color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; margin-top: 15px; }

        #notification-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { padding: 15px 25px; border-radius: 8px; color: white; font-weight: 600; margin-bottom: 10px; animation: slideLeft 0.3s ease-out; }

        @keyframes slideLeft { from { transform: translateX(100%); } to { transform: translateX(0); } }

        @media (max-width: 768px) {
            .sidebar { width: 0; padding: 0; overflow: hidden; }
            .main-content { margin-left: 0; padding: 20px; }
            .users-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="notification-container"></div>

    <div id="login-screen" class="auth-wrapper">
        <div class="auth-card">
            <img src="https://i.imgur.com/54kosOd.png" class="auth-logo">
            <h2>Admin Login</h2>
            <form id="admin-login-form">
                <div class="input-box"><i class="fas fa-envelope"></i><input type="email" id="admin-email" placeholder="Email" required></div>
                <div class="input-box"><i class="fas fa-lock"></i><input type="password" id="admin-password" placeholder="Password" required></div>
                <button type="submit" id="btn-login" class="btn-primary">Sign In</button>
            </form>
        </div>
    </div>

    <div id="admin-dashboard" class="dashboard-wrapper hidden">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="https://i.imgur.com/54kosOd.png">
                <h3>Admin Hub</h3>
            </div>
            <div class="stats-box"><span>Total Applicants</span><h1 id="total-count">0</h1></div>
            <button id="copy-all-emails" class="btn-action"><i class="fas fa-mail-bulk"></i> Copy All Emails</button>
            <button class="btn-logout" onclick="adminLogout()">Logout</button>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div><h1>Applications Manager</h1><p>View all team form submissions below.</p></div>
                <img src="https://i.imgur.com/54kosOd.png" style="width: 50px; border-radius: 50%;">
            </header>
            <div id="loading-state" style="text-align:center; padding: 50px;"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Loading Data...</p></div>
            <div id="users-grid" class="users-grid"></div>
        </main>
    </div>

    <script type="module">
        import { app } from './firebase.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, get, remove, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const auth = getAuth(app);
        const db = getDatabase(app);
        let emailList = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                fetchApplicants();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-dashboard').classList.add('hidden');
            }
        });

        document.getElementById('admin-login-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('admin-email').value, document.getElementById('admin-password').value);
                toast("Login Successful", "success");
            } catch (error) {
                toast("Error: " + error.message, "error");
                btn.disabled = false;
            }
        };

        function fetchApplicants() {
            const applicantsRef = ref(db, 'applications');
            onValue(applicantsRef, (snapshot) => {
                document.getElementById('loading-state').style.display = 'none';
                const grid = document.getElementById('users-grid');
                grid.innerHTML = '';
                emailList = [];
                
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const uids = Object.keys(data);
                    document.getElementById('total-count').innerText = uids.length;
                    uids.forEach(uid => {
                        const user = data[uid];
                        emailList.push(user.personalInfo.email);
                        renderCard(uid, user);
                    });
                } else {
                    grid.innerHTML = '<p>No data found.</p>';
                    document.getElementById('total-count').innerText = "0";
                }
            });
        }

        function renderCard(uid, user) {
            const grid = document.getElementById('users-grid');
            const card = document.createElement('div');
            card.className = 'user-card';
            card.innerHTML = `
                <div class="card-top">
                    <img src="${user.personalInfo.photoUrl}" class="card-img" onerror="this.src='https://ui-avatars.com/api/?name=${user.personalInfo.fullName}'">
                    <div><h3>${user.personalInfo.fullName}</h3><span style="color:var(--primary); font-size:12px; font-weight:bold;">ID: ${user.teamId}</span></div>
                </div>
                <div class="card-info">
                    <div class="data-item"><label>Email</label><span>${user.personalInfo.email}</span></div>
                    <div class="data-item"><label>Phone</label><span>${user.personalInfo.phone}</span></div>
                    <div class="data-item"><label>State</label><span>${user.address.state}</span></div>
                    
                    <div class="accordian-box">
                        <details>
                            <summary>Full Form & Agreements</summary>
                            <div class="q-row"><b>Motivation:</b><p>${user.professional.whyJoin}</p></div>
                            <div class="q-row"><b>Education:</b><p>${user.professional.education}</p></div>
                            <div class="q-row"><b>Expertise:</b><p>${user.professional.expertise}</p></div>
                            <div class="q-row"><b>Truth of AI:</b><p>${user.agreements.aiTruth}</p></div>
                            <div class="q-row"><b>Effective Usage:</b><p>${user.agreements.aiUsage}</p></div>
                            <div class="q-row"><b>Collaboration:</b><p>${user.agreements.sharingIdeas}</p></div>
                            <div class="q-row"><b>Hard Work:</b><p>${user.agreements.hardWork}</p></div>
                            <div class="q-row"><b>Profit Sharing:</b><p>${user.agreements.profitSharing}</p></div>
                            <div class="q-row"><b>Device Type:</b><p>${user.agreements.deviceType}</p></div>
                            <div class="q-row"><b>Video Editing:</b><p>${user.agreements.videoEditing}</p></div>
                        </details>
                    </div>

                    <button class="btn-delete" onclick="dropUser('${uid}')"><i class="fas fa-trash"></i> Delete User Forever</button>
                </div>
            `;
            grid.appendChild(card);
        }

        window.dropUser = async (uid) => {
            if (confirm("Are you sure Delete This Application file, ?")) {
                try {
                    await remove(ref(db, 'applications/' + uid));
                    toast("User deleted successfully", "success");
                } catch (e) { toast("Error deleting", "error"); }
            }
        };

        document.getElementById('copy-all-emails').onclick = () => {
            if (emailList.length > 0) {
                navigator.clipboard.writeText(emailList.join(', '));
                toast("All emails copied to clipboard!", "success");
            } else { toast("No emails found", "error"); }
        };

        window.adminLogout = () => signOut(auth);

        function toast(msg, type) {
            const container = document.getElementById('notification-container');
            const box = document.createElement('div');
            box.className = 'toast';
            box.style.backgroundColor = type === 'success' ? '#10b981' : '#ef4444';
            box.innerText = msg;
            container.appendChild(box);
            setTimeout(() => box.remove(), 4000);
        }
    </script>
</body>
</html>
