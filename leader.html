<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Team Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --danger: #ef4444;
            --success: #10b981;
            --sidebar-bg: #0f172a;
            --bg-body: #f1f5f9;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); line-height: 1.5; }

        .hidden { display: none !important; }
        
        /* Auth Section */
        .auth-wrapper { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--sidebar-bg); padding: 20px; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .auth-logo { width: 80px; margin-bottom: 20px; border-radius: 50%; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .input-group input { width: 100%; padding: 12px 15px 12px 45px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

        /* Dashboard Layout */
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { width: 280px; background: var(--sidebar-bg); color: white; padding: 30px 20px; position: fixed; height: 100vh; z-index: 100; transition: 0.3s; }
        .main-content { flex: 1; margin-left: 280px; padding: 30px; }
        
        .stats-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); }

        .btn { border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
        .btn-primary { background: var(--primary); color: white; padding: 12px; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 10px; margin-top: auto; }
        .btn-outline-danger:hover { background: var(--danger); color: white; }

        /* User Cards Grid */
        .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; margin-top: 30px; }
        .user-card { background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; transition: transform 0.2s; }
        .user-card:hover { transform: translateY(-5px); }

        .card-header { padding: 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); background: #eee; }

        .card-body { padding: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; align-items: center; }
        .info-row label { color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .info-row span { color: var(--text-main); font-weight: 500; text-align: right; }
        
        .copy-btn { background: #eef2ff; color: var(--primary); border: none; padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; margin-left: 5px; }
        .copy-btn:hover { background: var(--primary); color: white; }

        /* Agreement Styling */
        details { margin-top: 15px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
        summary { padding: 12px; font-weight: 700; font-size: 14px; color: var(--primary); cursor: pointer; outline: none; display: flex; align-items: center; gap: 8px; }
        
        .agreement-list { padding: 15px; border-top: 1px solid #e2e8f0; }
        .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); margin: 15px 0 8px 0; font-weight: 800; border-bottom: 2px solid #e2e8f0; padding-bottom: 4px; }
        
        .agreement-item { padding: 10px 0; border-bottom: 1px dashed #e2e8f0; }
        .agreement-item:last-child { border-bottom: none; }
        .agreement-item b { display: block; color: var(--text-muted); font-size: 12px; margin-bottom: 3px; }
        .agreement-item p { font-size: 13px; color: var(--text-main); font-weight: 500; }
        
        .tag { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .tag-yes { background: #dcfce7; color: #166534; }
        .tag-no { background: #fee2e2; color: #991b1b; }

        .btn-delete { background: #fee2e2; color: var(--danger); padding: 10px; font-size: 13px; margin-top: 15px; width: 100%; border-radius: 10px; }
        .btn-delete:hover { background: var(--danger); color: white; }

        #toast-box { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        .toast { padding: 15px 25px; border-radius: 12px; color: white; font-weight: 600; margin-top: 10px; animation: slideIn 0.3s ease; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        @media (max-width: 992px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar h3, .sidebar span, .sidebar .btn span { display: none; }
            .main-content { margin-left: 80px; }
        }
        @media (max-width: 600px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding: 15px; }
        }
        
        
       
/* Mayar da Sidebar ta zama Top Navbar */
.sidebar {
    width: 100% !important;
    height: var(--nav-height) !important;
    position: sticky;
    top: 0;
    left: 0;
    display: flex !important;
    flex-direction: row !important; /* Jera su a kwance */
    align-items: center;
    justify-content: space-between; /* Raba su: Logo a hagu, Buttons a dama */
    padding: 0 40px;
    background: var(--sidebar-bg);
    z-index: 1000;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.sidebar-header {
    display: flex;
    align-items: center;
    gap: 15px;
    text-align: left !important;
}

.sidebar-header h3 {
    font-size: 1.2rem;
    color: white;
}

/* Bangaren Buttons (Stats, Copy, Logout) */
.nav-actions {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 20px; /* Sarari tsakanin button 1, 2, da 3 */
}

.stats-card {
    margin: 0 !important;
    padding: 8px 15px !important;
    background: rgba(255,255,255,0.1) !important;
    border: 1px solid rgba(255,255,255,0.2) !important;
    display: flex;
    align-items: center;
    gap: 10px;
    height: 45px;
}

.stats-card h2 {
    margin: 0;
    font-size: 1.1rem;
    color: var(--success);
}

.sidebar .btn {
    width: auto !important; /* Kar su cika sarari */
    height: 45px;
    padding: 0 20px !important;
    margin: 0 !important;
    font-size: 14px;
    white-space: nowrap;
}


.main-content {
    margin-left: 0 !important;
    padding: 30px 40px !important;
    max-width: 1400px;
    margin: 0 auto !important;
}

/* --- Gyaran Mobile (Responsive) --- */
@media (max-width: 850px) {
    .sidebar {
        height: auto !important;
        flex-direction: column !important;
        padding: 15px;
        gap: 15px;
    }
    
    .nav-actions {
        width: 100%;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
    }

    .sidebar .btn, .stats-card {
        flex: 1; /* Su yi daidai a waya */
        min-width: 140px;
    }

    .sidebar-header h3 {
        display: block !important;
    }
}

    </style>
</head>
<body>
    <div id="toast-box"></div>

    <div id="login-section" class="auth-wrapper">
        <div class="auth-card">
            <img src="https://i.imgur.com/54kosOd.png" class="auth-logo">
            <h2 style="margin-bottom: 10px;">Admin Access</h2>
            <form id="login-form">
                <div class="input-group">
                    <i class="fas fa-user-shield"></i>
                    <input type="email" id="email" placeholder="Admin Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login to Dashboard</button>
            </form>
        </div>
    </div>

    
           <aside class="sidebar">
    <div class="sidebar-header">
        <img src="https://i.imgur.com/54kosOd.png" style="width: 45px; border-radius: 50%;">
        <h3>Admin Hub</h3>
    </div>
<div class="stats-card">
                <i class="fas fa-users" style="color: var(--primary); margin-bottom: 5px;"></i>
                <br><span>Total Users</span>
                <h2 id="user-count">0</h2>
            </div>

            <button id="copy-emails" class="btn btn-primary">
                <i class="fas fa-copy"></i> <span>Copy All Emails</span>
            </button>

            <button onclick="logout()" class="btn btn-outline-danger">
                <i class="fas fa-power-off"></i> <span>Logout</span>
            </button>
        </aside>
    
        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px;">
                <h1><i class="fas fa-tasks" style="color: var(--primary);"></i> Applications Manager</h1>
            </header>

            <div id="loader" style="text-align: center; padding: 50px;">
                <i class="fas fa-circle-notch fa-spin fa-3x" style="color: var(--primary);"></i>
                <p style="margin-top: 10px; color: var(--text-muted);">Loading user data...</p>
            </div>

            <div id="users-grid" class="users-grid"></div>
        </main>
    </div>

    <script type="module">
        import { app } from './firebase.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const auth = getAuth(app);
        const db = getDatabase(app);
        let allEmails = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');
                loadData();
            } else {
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('dashboard-section').classList.add('hidden');
            }
        });

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                showToast("Welcome Back Admin!", "success");
            } catch (err) {
                showToast("Error: " + err.message, "danger");
            }
        };

        function loadData() {
            const userRef = ref(db, 'users');
            onValue(userRef, (snapshot) => {
                const grid = document.getElementById('users-grid');
                const loader = document.getElementById('loader');
                loader.style.display = 'none';
                grid.innerHTML = '';
                allEmails = [];

                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const keys = Object.keys(data);
                    document.getElementById('user-count').innerText = keys.length;
                    
                    keys.forEach(id => {
                        const user = data[id];
                        if(user.personalInfo?.email) allEmails.push(user.personalInfo.email);
                        renderUserCard(id, user);
                    });
                } else {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);"><i class="fas fa-folder-open fa-3x"></i><p>No applications found.</p></div>';
                    document.getElementById('user-count').innerText = "0";
                }
            });
        }

        function renderUserCard(id, user) {
            const grid = document.getElementById('users-grid');
            const div = document.createElement('div');
            div.className = 'user-card';

            // Helper to format Boolean values into Tags
            const formatAgr = (val) => {
                const isYes = val === "Yes" || val === true;
                return `<span class="tag ${isYes ? 'tag-yes' : 'tag-no'}">${val}</span>`;
            };

            div.innerHTML = `
                <div class="card-header">
                    <img src="${user.personalInfo.photoUrl}" class="user-avatar" onerror="this.src='https://ui-avatars.com/api/?name=${user.personalInfo.fullName}'">
                    <div>
                        <h4 style="font-size: 16px;">${user.personalInfo.fullName} ${user.personalInfo.middleName || ''}</h4>
                        <small style="color: var(--primary); font-weight: 800;"><i class="fas fa-id-badge"></i> ID: ${user.teamId}</small>
                    </div>
                </div>

                <div class="card-body">
                    <div class="info-row">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <span>
                            ${user.personalInfo.email}
                            <button class="copy-btn" onclick="copyThis('${user.personalInfo.email}')"><i class="fas fa-copy"></i></button>
                        </span>
                    </div>
                    <div class="info-row">
                        <label><i class="fas fa-phone"></i> Phone</label>
                        <span>${user.personalInfo.phone}</span>
                    </div>
                    <div class="info-row">
                        <label><i class="fab fa-whatsapp"></i> WhatsApp</label>
                        <span>${user.personalInfo.whatsapp || 'N/A'}</span>
                    </div>
                    <div class="info-row">
                        <label><i class="fas fa-venus-mars"></i> Gender</label>
                        <span>${user.personalInfo.gender}</span>
                    </div>
                    <div class="info-row">
                        <label><i class="fas fa-star"></i> Expertise</label>
                        <span style="color: var(--primary);">${user.professional.expertise}</span>
                    </div>

                    <details>
                        <summary><i class="fas fa-info-circle"></i> View Full Application</summary>
                        <div class="agreement-list">
                            
                            <div class="section-title">Professional Background</div>
                            <div class="agreement-item"><b>Education Level:</b><p>${user.professional.education}</p></div>
                            <div class="agreement-item"><b>Created project before?</b><p>${user.professional.createdBefore}</p></div>
                            <div class="agreement-item"><b>Why join this team?</b><p>${user.professional.whyJoin}</p></div>
                            <div class="agreement-item"><b>Contribution Plan:</b><p>${user.professional.contributionPlan}</p></div>
                            <div class="agreement-item"><b>Portfolio Link:</b><p><a href="${user.professional.workLink}" target="_blank">${user.professional.workLink}</a></p></div>
                            
                            <div class="section-title">Terms & Agreements</div>
                            <div class="agreement-item"><b>Do you agree with the truth of AI?</b><p>${formatAgr(user.agreements.aiTruth)}</p></div>
                            <div class="agreement-item"><b>Can you use AI tools effectively?</b><p>${formatAgr(user.agreements.aiUsage)}</p></div>
                            <div class="agreement-item"><b>Agree to share ideas/work with partners?</b><p>${formatAgr(user.agreements.sharingIdeas)}</p></div>
                            <div class="agreement-item"><b>Ready to work hard until success?</b><p>${formatAgr(user.agreements.hardWork)}</p></div>
                            <div class="agreement-item"><b>Agree to profit-sharing system?</b><p>${formatAgr(user.agreements.profitSharing)}</p></div>
                            <div class="agreement-item"><b>Primary Device:</b><p><i class="fas fa-mobile-alt"></i> ${user.agreements.deviceType}</p></div>
                            <div class="agreement-item"><b>Can you edit videos for social media?</b><p>${formatAgr(user.agreements.videoEditing)}</p></div>

                            <div class="section-title">Contact & Socials</div>
                            <div class="agreement-item"><b>Location:</b><p>${user.address.state}, ${user.address.lga}</p></div>
                            <div class="agreement-item"><b>Home Address:</b><p>${user.address.homeAddress}</p></div>
                            <div class="agreement-item"><b>Facebook:</b><p>${user.socialMedia.facebook}</p></div>
                            <div class="agreement-item"><b>Instagram:</b><p>${user.socialMedia.instagram}</p></div>
                        </div>
                    </details>

                    <div class="info-row" style="margin-top:10px; border:none;">
                        <label><i class="fas fa-lock"></i> User Password</label>
                        <code style="background:#eee; padding:2px 5px; border-radius:4px;">${user.personalInfo.password}</code>
                    </div>

                    <button class="btn btn-delete" onclick="deleteUser('${id}')">
                        <i class="fas fa-trash-alt"></i> Delete Application Forever
                    </button>
                </div>
            `;
            grid.appendChild(div);
        }

        window.copyThis = (text) => {
            navigator.clipboard.writeText(text);
            showToast("Copied to clipboard!", "success");
        }

        document.getElementById('copy-emails').onclick = () => {
            if (allEmails.length > 0) {
                navigator.clipboard.writeText(allEmails.join(', '));
                showToast("All " + allEmails.length + " emails copied!", "success");
            } else {
                showToast("No emails found", "danger");
            }
        };

        window.deleteUser = async (id) => {
            if (confirm("Warning: This will permanently delete this application. Proceed?")) {
                try {
                    await remove(ref(db, 'users/' + id));
                    showToast("User deleted successfully", "success");
                } catch (err) {
                    showToast("Error deleting user", "danger");
                }
            }
        };

        window.logout = () => signOut(auth);

        function showToast(msg, type) {
            const box = document.getElementById('toast-box');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = type === 'success' ? 'var(--success)' : 'var(--danger)';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i> ${msg}`;
            box.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }
    </script>
</body>
</html>
