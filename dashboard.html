<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
--primary:#6366f1;
--bg:#0f172a;
--card:#111827;
--text:#e5e7eb;
--sub:#9ca3af;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:linear-gradient(135deg,#0f172a,#020617);color:var(--text)}
.hidden{display:none}
.loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#020617;z-index:9999}
.spin{width:45px;height:45px;border:4px solid #1f2937;border-top:4px solid var(--primary);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.wrapper{display:flex;min-height:100vh}
.sidebar{width:240px;background:#020617;padding:20px}
.sidebar h2{margin-bottom:30px}
.sidebar div{padding:12px;border-radius:8px;margin-bottom:10px;cursor:pointer}
.sidebar div:hover{background:var(--primary)}

.main{flex:1;padding:20px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.avatar{width:35px;height:35px;border-radius:50%;object-fit:cover}

.grid{display:grid;grid-template-columns:300px 1fr;gap:20px}
.card{background:var(--card);padding:20px;border-radius:15px}
.profile{text-align:center}
.profile img{width:90px;height:90px;border-radius:50%;margin-bottom:10px}
.small{color:var(--sub);font-size:14px}

.q{margin-bottom:15px;padding:12px;background:#020617;border-radius:10px}
.q b{display:block;margin-bottom:5px}

@media(max-width:900px){
.sidebar{display:none}
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div id="loader" class="loader"><div class="spin"></div></div>

<div id="app" class="wrapper hidden">

<div class="sidebar">
<h2>Teams AI</h2>
<div onclick="logout()">Logout</div>
</div>

<div class="main">

<div class="top">
<div>ID: <b id="id">---</b></div>
<div style="display:flex;gap:10px;align-items:center">
<img id="topImg" class="avatar">
<span id="topName">User</span>
</div>
</div>

<div class="grid">

<div class="card profile">
<img id="img">
<h3 id="name">Name</h3>
<p id="email" class="small"></p>
<p class="small">Password: <span id="pass"></span></p>
<p class="small">Member ID: <b id="member"></b></p>
</div>

<div class="card">
<div id="data"></div>
</div>

</div>

</div>

</div>

<script type="module">
import { app } from './firebase.js';
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase,ref,get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const auth=getAuth(app);
const db=getDatabase(app);

setTimeout(()=>{
document.getElementById('loader').classList.add('hidden');
},5000);

onAuthStateChanged(auth,async user=>{
if(!user){location.href='login.html';return;}

try{
const snap=await get(ref(db,'users/'+user.uid));

if(!snap.exists()){location.href='index.html';return;}

const d=snap.val();

document.getElementById('id').innerText=d.teamId;
document.getElementById('member').innerText=d.teamId;
document.getElementById('topName').innerText=d.personalInfo.fullName;
document.getElementById('name').innerText=d.personalInfo.fullName;
document.getElementById('email').innerText=d.personalInfo.email;
document.getElementById('pass').innerText=d.personalInfo.password;

const img=d.personalInfo.photoUrl||'https://via.placeholder.com/100';
document.getElementById('img').src=img;
document.getElementById('topImg').src=img;

const list=[
["Why Join",d.professional.whyJoin],
["Education",d.professional.education],
["Expertise",d.professional.expertise],
["Created",d.professional.createdBefore],
["Work/Plan",d.professional.createdBefore==="Yes"?d.professional.workLink:d.professional.contributionPlan],
["Device",d.agreements.deviceType],
["Video Editing",d.agreements.videoEditing],
["Address",d.address.homeAddress+", "+d.address.lga+", "+d.address.state]
];

document.getElementById('data').innerHTML=list.map(i=>`
<div class="q">
<b>${i[0]}</b>
<span>${i[1]}</span>
</div>
`).join('');

document.getElementById('loader').classList.add('hidden');
document.getElementById('app').classList.remove('hidden');

}catch(e){
location.href='login.html';
}
});

window.logout=()=>{
signOut(auth).then(()=>{
localStorage.clear();
location.href='login.html';
});
};
</script>

</body>
</html>
