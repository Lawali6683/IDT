<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | Teams AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --sidebar: #0f172a;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --accent: #10b981;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
        }

        body { 
            background: var(--bg); 
            color: var(--text-dark); 
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        .dashboard-wrapper { 
            display: flex; 
            min-height: 100vh; 
        }

        .sidebar { 
            width: 280px; 
            background: var(--sidebar); 
            color: white; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            position: sticky;
            top: 0;
            height: 100vh;
            transition: all 0.3s ease;
        }

        .sidebar-header { 
            text-align: center; 
            padding-bottom: 30px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            margin-bottom: 30px;
        }

        .side-logo { 
            width: 70px; 
            height: 70px;
            border-radius: 15px; 
            margin-bottom: 15px;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        .nav-links { list-style: none; }

        .nav-links li { 
            padding: 14px 18px; 
            cursor: pointer; 
            border-radius: 12px; 
            margin-bottom: 8px; 
            transition: 0.3s; 
            color: #94a3b8;
            display: flex;
            align-items: center;
            font-weight: 500;
        }

        .nav-links li i { 
            font-size: 1.2rem;
            margin-right: 15px; 
            width: 20px;
            text-align: center;
        }

        .nav-links li:hover, .nav-links li.active { 
            background: rgba(99, 102, 241, 0.1); 
            color: var(--primary); 
        }

        .nav-links li.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .main-body { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            width: 100%;
        }

        .top-bar { 
            background: white; 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-id-badge {
            background: #f8fafc;
            padding: 8px 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .top-user-info { display: flex; align-items: center; gap: 12px; }

        .avatar-sm { 
            width: 40px; 
            height: 40px; 
            border-radius: 10px; 
            object-fit: cover;
            background: #e2e8f0;
        }

        .content-area { padding: 30px; max-width: 1200px; margin: 0 auto; width: 100%; }

        .welcome-banner { 
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); 
            color: white; 
            padding: 40px; 
            border-radius: 24px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 35px;
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
        }

        .welcome-text h1 { font-size: 2rem; margin-bottom: 10px; font-weight: 800; }
        .welcome-text p { opacity: 0.9; font-size: 1.1rem; }

        .dashboard-grid { 
            display: grid; 
            grid-template-columns: 350px 1fr; 
            gap: 30px; 
        }

        .card { 
            background: white; 
            border-radius: 20px; 
            padding: 30px; 
            border: 1px solid var(--border); 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .profile-header { text-align: center; margin-bottom: 30px; }

        .large-avatar { 
            width: 120px; 
            height: 120px; 
            border-radius: 30px; 
            border: 5px solid #f8fafc; 
            margin-bottom: 20px; 
            object-fit: cover;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .profile-header h2 { font-size: 1.5rem; color: var(--text-dark); margin-bottom: 5px; }

        .security-info { 
            background: #f8fafc; 
            padding: 20px; 
            border-radius: 16px; 
            border: 1px solid var(--border);
        }

        .info-item { margin-bottom: 20px; }
        .info-item:last-child { margin-bottom: 0; }

        .info-item label { 
            font-size: 0.75rem; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700; 
            color: var(--text-light); 
            display: block; 
            margin-bottom: 8px; 
        }

        .pass-box { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: white;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-family: 'Monaco', monospace; 
            font-size: 1rem; 
            color: var(--primary-dark); 
        }

        .card-title { 
            font-size: 1.25rem; 
            font-weight: 700; 
            margin-bottom: 25px; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .details-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100%, 1fr));
            gap: 15px;
        }

        .q-row { 
            padding: 20px; 
            background: #ffffff; 
            border-radius: 15px; 
            border: 1px solid var(--border);
            transition: 0.2s;
        }

        .q-row:hover { border-color: var(--primary); background: #fcfcff; }

        .q-text { 
            font-weight: 700; 
            color: var(--text-light); 
            font-size: 0.85rem;
            display: block; 
            margin-bottom: 10px; 
            text-transform: uppercase;
        }

        .a-text { 
            color: var(--text-dark); 
            font-size: 1rem; 
            line-height: 1.6;
            font-weight: 500;
        }

        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #e2e8f0;
            border-top: 6px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 1024px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar h3, .nav-links span { display: none; }
            .nav-links li i { margin-right: 0; font-size: 1.4rem; }
        }

        @media (max-width: 640px) {
            .sidebar { display: none; }
            .top-bar { padding: 15px; }
            .welcome-banner { padding: 25px; flex-direction: column; text-align: center; gap: 20px; }
            .welcome-banner img { width: 80px; }
            .content-area { padding: 15px; }
            .welcome-text h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-weight: 600; color: var(--text-light);">Loading Dashboard...</p>
    </div>

    <div class="dashboard-wrapper hidden" id="dashboard-content">
        <nav class="sidebar">
            <div class="sidebar-header">
                <img src="https://i.imgur.com/54kosOd.png" alt="Logo" class="side-logo">
                <h3>Teams AI</h3>
            </div>
            <ul class="nav-links">
                <li class="active"><i class="fas fa-grid-2"></i> <span>Overview</span></li>
                <li><i class="fas fa-user-circle"></i> <span>Profile</span></li>
                <li onclick="logout()"><i class="fas fa-power-off"></i> <span>Logout</span></li>
            </ul>
        </nav>

        <main class="main-body">
            <header class="top-bar">
                <div class="user-id-badge">
                    <span style="color: var(--text-light)">UID:</span> <strong id="display-custom-id">---</strong>
                </div>
                <div class="top-user-info">
                    <span id="top-name" style="display: none;">User</span>
                    <img src="" id="top-avatar" class="avatar-sm">
                </div>
            </header>

            <div class="content-area">
                <div class="welcome-banner">
                    <div class="welcome-text">
                        <h1>Sannu, <span id="user-first-name">Candidate</span>!</h1>
                        <p>An yi nasarar adana bayanan ka a rumbun mu na zamani.</p>
                    </div>
                    <img src="https://i.imgur.com/54kosOd.png" style="width: 120px; filter: brightness(0) invert(1); opacity: 0.9;">
                </div>

                <div class="dashboard-grid">
                    <div class="card profile-card">
                        <div class="profile-header">
                            <img src="" id="user-photo" class="large-avatar" onerror="this.src='https://ui-avatars.com/api/?name=User&background=6366f1&color=fff'">
                            <h2 id="full-name">---</h2>
                            <p id="user-email" style="color: var(--text-light)">---</p>
                        </div>

                        <div class="security-info">
                            <div class="info-item">
                                <label>Password dinka</label>
                                <div class="pass-box">
                                    <span id="user-pass">••••••••</span>
                                    <i class="fas fa-eye" id="toggle-pass" style="cursor: pointer; color: var(--text-light)"></i>
                                </div>
                            </div>
                            <div class="info-item">
                                <label>Member ID</label>
                                <span id="member-id" style="font-weight: 800; color: var(--primary-dark); font-size: 1.1rem;">---</span>
                            </div>
                        </div>
                    </div>

                    <div class="card details-card">
                        <h3 class="card-title"><i class="fas fa-clipboard-list" style="color: var(--primary)"></i> Cikakkun Bayani</h3>
                        <div class="details-list" id="questions-container">
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { app } from './firebase.js';
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const snapshot = await get(ref(db, 'applications/' + user.uid));
                    if (snapshot.exists()) {
                        populateDashboard(snapshot.val());
                    } else {
                        window.location.href = 'index.html';
                    }
                } catch (error) {
                    console.error("Error:", error);
                    document.getElementById('loader').innerHTML = "<p>Matsala ta samu yayin loda data.</p>";
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        function populateDashboard(data) {
            document.getElementById('display-custom-id').innerText = data.teamId || 'N/A';
            document.getElementById('member-id').innerText = data.teamId || 'N/A';
            document.getElementById('full-name').innerText = data.personalInfo.fullName;
            document.getElementById('user-email').innerText = data.personalInfo.email;
            
            const rawPass = data.personalInfo.password;
            const passElem = document.getElementById('user-pass');
            passElem.setAttribute('data-pass', rawPass);
            
            document.getElementById('user-first-name').innerText = data.personalInfo.fullName.split(' ')[0];
            
            const photo = data.personalInfo.photoUrl;
            document.getElementById('top-avatar').src = photo;
            document.getElementById('user-photo').src = photo;

            const questions = [
                { q: "Me yasa kake son shiga wannan team din?", a: data.professional.whyJoin },
                { q: "Matakin Karatu:", a: data.professional.education },
                { q: "Kwarewa a fannin Tech:", a: data.professional.expertise },
                { q: "Ka taba kera wani abu?", a: data.professional.createdBefore },
                { q: "Sakamako/Planning:", a: data.professional.createdBefore === 'Yes' ? data.professional.workLink : data.professional.contributionPlan },
                { q: "Nau'in Na'ura:", a: data.agreements.deviceType },
                { q: "Address:", a: `${data.address.homeAddress}, ${data.address.lga}, ${data.address.state}.` }
            ];

            document.getElementById('questions-container').innerHTML = questions.map(item => `
                <div class="q-row">
                    <span class="q-text">${item.q}</span>
                    <p class="a-text">${item.a || 'Ba a bayar ba'}</p>
                </div>
            `).join('');

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');
        }

        document.getElementById('toggle-pass').onclick = function() {
            const passSpan = document.getElementById('user-pass');
            const isHidden = passSpan.innerText.includes('•');
            passSpan.innerText = isHidden ? passSpan.getAttribute('data-pass') : '••••••••';
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        };

        window.logout = function() {
            signOut(auth).then(() => {
                localStorage.clear();
                window.location.href = 'login.html';
            });
        };
    </script>
</body>
</html>
