<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
--primary:#7c3aed;
--card:rgba(255,255,255,0.05);
--text:#fff;
--sub:#cbd5f5;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

body{
color:var(--text);
min-height:100vh;
background:#020617;
overflow-x:hidden;
}

.bg{
position:fixed;
inset:0;
z-index:-1;
background:radial-gradient(circle at 20% 30%,#7c3aed55,transparent 40%),
radial-gradient(circle at 80% 70%,#06b6d455,transparent 40%),
radial-gradient(circle at 50% 50%,#9333ea33,transparent 60%);
animation:move 10s infinite alternate ease-in-out;
}

@keyframes move{
0%{transform:scale(1) translate(0,0)}
100%{transform:scale(1.2) translate(-20px,20px)}
}

.hidden{display:none}

.loader{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#020617;
z-index:9999;
}

.spin{
width:50px;
height:50px;
border:4px solid #1e293b;
border-top:4px solid #7c3aed;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

.wrapper{display:flex;min-height:100vh}

.sidebar{
width:230px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
padding:20px;
}

.sidebar h2{margin-bottom:30px}

.sidebar div{
padding:12px;
border-radius:10px;
cursor:pointer;
}

.sidebar div:hover{
background:rgba(255,255,255,0.1);
}

.main{flex:1;padding:20px}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.avatar{
width:35px;
height:35px;
border-radius:50%;
object-fit:cover;
}

.grid{
display:grid;
grid-template-columns:300px 1fr;
gap:20px;
}

.card{
background:var(--card);
backdrop-filter:blur(15px);
padding:20px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.08);
}

.profile{text-align:center}

.profile img{
width:90px;
height:90px;
border-radius:50%;
margin-bottom:10px;
}

.small{color:var(--sub);font-size:14px}

.q{
margin-bottom:15px;
padding:12px;
border-radius:10px;
background:rgba(0,0,0,0.3);
}

.q b{display:block;margin-bottom:5px}

@media(max-width:900px){
.sidebar{display:none}
.grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<div class="bg"></div>

<div id="loader" class="loader">
<div class="spin"></div>
</div>

<div id="app" class="wrapper hidden">

<div class="sidebar">
<h2>Teams AI</h2>
<div onclick="logout()">Logout</div>
</div>

<div class="main">

<div class="top">
<div>ID: <b id="id">---</b></div>
<div style="display:flex;gap:10px;align-items:center">
<img id="topImg" class="avatar">
<span id="topName">User</span>
</div>
</div>

<div class="grid">

<div class="card profile">
<img id="img">
<h3 id="name"></h3>
<p id="email" class="small"></p>
<p class="small">Password: <span id="pass"></span></p>
<p class="small">Member ID: <b id="member"></b></p>
</div>

<div class="card">
<div id="data"></div>
</div>

</div>

</div>

</div>

<script type="module">
import { app } from './firebase.js';
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase,ref,get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const auth=getAuth(app);
const db=getDatabase(app);

let loaded=false;

setTimeout(()=>{
if(!loaded){
document.getElementById('loader').classList.add('hidden');
}
},8000);

onAuthStateChanged(auth,async user=>{
if(!user){location.href='login.html';return;}

try{
const snap=await get(ref(db,'users/'+user.uid));

if(!snap.exists()){location.href='index.html';return;}

const d=snap.val();

document.getElementById('id').innerText=d.teamId;
document.getElementById('member').innerText=d.teamId;
document.getElementById('topName').innerText=d.personalInfo.fullName;
document.getElementById('name').innerText=d.personalInfo.fullName;
document.getElementById('email').innerText=d.personalInfo.email;
document.getElementById('pass').innerText=d.personalInfo.password;

const img=d.personalInfo.photoUrl||'https://via.placeholder.com/100';
document.getElementById('img').src=img;
document.getElementById('topImg').src=img;

const list=[
["Why Join",d.professional.whyJoin],
["Education",d.professional.education],
["Expertise",d.professional.expertise],
["Created",d.professional.createdBefore],
["Work/Plan",d.professional.createdBefore==="Yes"?d.professional.workLink:d.professional.contributionPlan],
["Device",d.agreements.deviceType],
["Video Editing",d.agreements.videoEditing],
["Address",d.address.homeAddress+", "+d.address.lga+", "+d.address.state]
];

document.getElementById('data').innerHTML=list.map(i=>`
<div class="q">
<b>${i[0]}</b>
<span>${i[1]}</span>
</div>
`).join('');

loaded=true;

document.getElementById('loader').classList.add('hidden');
document.getElementById('app').classList.remove('hidden');

}catch(e){
document.getElementById('loader').classList.add('hidden');
location.href='login.html';
}
});

window.logout=()=>{
signOut(auth).then(()=>{
localStorage.clear();
location.href='login.html';
});
};
</script>

</body>
</html>
